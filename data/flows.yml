flows:
  search_book:
    description: Help users find books by title or genre in the PageTurner catalogue.
    steps:
      - id: ask_genre
        collect: book_genre
        description: the genre or type of book the user is interested in (e.g. fantasy, mystery, romance, sci-fi, thriller). If the user already mentioned a specific title, set this to null.
        next:
          - if: slots.book_genre is not null
            then: do_search
          - else: ask_title
      - id: ask_title
        collect: book_title
        description: the exact or approximate title of the book
        next: do_search
      - id: do_search
        action: action_search_books
        next: show_results
      - id: show_results
        action: utter_search_results
        next: END

  reserve_book:
    description: Help users reserve a book at PageTurner Books so it is ready for pick-up.
    steps:
      - id: get_title
        collect: reserve_title
        description: the title of the book the user wants to reserve
        next: get_name
      - id: get_name
        collect: customer_name
        description: the full name of the customer making the reservation
        next: check_availability
      - id: check_availability
        action: action_check_book_availability
        next:
          - if: slots.is_available
            then: confirm
          - else: unavailable
      - id: confirm
        action: utter_reservation_confirmed
        next: END
      - id: unavailable
        action: utter_reservation_unavailable
        next: END